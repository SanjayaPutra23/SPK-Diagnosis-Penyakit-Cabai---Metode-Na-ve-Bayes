{% extends "layout.html" %}

{% block title %}Kesalahan Server - SPK Cabai{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <div class="card shadow">
            <div class="card-body py-5">
                <i class="bi bi-bug display-1 text-danger"></i>
                <h1 class="display-4 mt-4">500</h1>
                <h2 class="mb-4">Kesalahan Server Internal</h2>
                <p class="lead mb-4">
                    Terjadi kesalahan pada server. Silakan coba beberapa saat lagi.
                </p>
                <div class="alert alert-warning">
                    <i class="bi bi-info-circle"></i>
                    Jika masalah berlanjut, hubungi administrator sistem.
                </div>
                <div class="d-grid gap-2 d-md-block">
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                        <i class="bi bi-house"></i> Kembali ke Beranda
                    </a>
                    <button onclick="history.back()" class="btn btn-secondary btn-lg">
                        <i class="bi bi-arrow-left"></i> Kembali
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
