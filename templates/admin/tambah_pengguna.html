{% extends "layout.html" %}

{% block title %}Tambah Pengguna - Admin SPK{% endblock %}

{% block head %}
<style>
    .content-wrapper { padding: 40px 20px; background-color: #f8f9fa; min-height: 100vh; }
    .form-card {
        background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        border: none; overflow: hidden; max-width: 600px; margin: 0 auto;
    }
    .form-header {
        background: linear-gradient(135deg, #198754 0%, #20c997 100%);
        padding: 25px 20px; text-align: center; color: white;
    }
    .form-icon-circle {
        width: 70px; height: 70px; background: rgba(255,255,255,0.2);
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-size: 2rem; margin: 0 auto 15px; backdrop-filter: blur(5px);
    }
</style>
{% endblock %}

{% block content %}
<div class="content-wrapper">
    <div class="form-card">
        <div class="form-header">
            <div class="form-icon-circle">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h4 class="fw-bold mb-0">Tambah Pengguna Baru</h4>
            <p class="text-white-50 small mb-0">Buat akses untuk Petani atau Admin baru</p>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <form action="{{ url_for('tambah_pengguna') }}" method="POST">
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-dark small">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Masukkan username unik" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-dark small">Nama Lengkap</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-card-text"></i></span>
                        <input type="text" name="nama_lengkap" class="form-control border-start-0 ps-0" placeholder="Contoh: Budi Santoso" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-dark small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="newPassword" class="form-control border-start-0 border-end-0 ps-0" placeholder="Buat password yang kuat" required>
                        <button class="btn border border-start-0 bg-white text-muted" type="button" onclick="togglePassword('newPassword', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold text-dark small">Pilih Role Akses</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-shield-check"></i></span>
                        <select name="role" class="form-select border-start-0 ps-0" required>
                            <option value="petani" selected>Petani (Akses Fitur Diagnosis)</option>
                            <option value="admin">Admin (Akses Kelola Data Master)</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <a href="{{ url_for('admin_pengguna') }}" class="btn btn-light rounded-pill flex-grow-1 fw-bold text-muted py-2">
                        Batal
                    </a>
                    <button type="submit" class="btn btn-success rounded-pill flex-grow-1 fw-bold shadow-sm py-2">
                        <i class="bi bi-save me-1"></i> Simpan Pengguna
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
{% endblock %}
